<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="meteo.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pogoda</title>
</head>
<body>
    <header>
        <h1>Szybka Pogoda</h1>
    </header>
    <div id="container">
        <div id="input_space">
            <input class="I_space" id="input_text" type="text" placeholder="Wpisz nazwę miasta.">
            <button class="I_space" id="input_btn">Szukaj</button>
        </div>
    </div>
    <div id="weather_space">
        <h2 class="W_space">Aktualna Pogoda</h2>
        <h3 id="city_name" class="W_space"></h3>
        <p id="temp" class="W_space"></p>
        <p id="weather_desc" class="W_space"></p>
        <img id="weather_ico" src="" alt="" class="W_space">
    </div>
    <footer>
        <h4>Żart Miasta</h4>
        <p id="joke"></p>
    </footer>

    <script src="meteo.js"></script>
</body>
</html>
